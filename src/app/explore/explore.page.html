<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Explore</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-card *ngFor="let item of data">
    <ion-card-header>
      <ion-card-title>{{ item.title }}</ion-card-title>
    </ion-card-header>

    <ion-card-content>
      <ion-button
        expand="block"
        (click)="saveFavourite(item)"
        [disabled]="savedIds.has(item.id)">
        {{ savedIds.has(item.id) ? 'Saved' : 'Save to Favourites' }}
      </ion-button>
    </ion-card-content>
  </ion-card>

</ion-content>
