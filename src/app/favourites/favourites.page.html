<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Completed Habits</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-card *ngFor="let item of favourites">

    <ion-card-header>
      <ion-card-title>{{ item.title }}</ion-card-title>
    </ion-card-header>

  </ion-card>

  <ion-text *ngIf="favourites.length === 0">
    <p>No habits completed yet.</p>
  </ion-text>

</ion-content>
